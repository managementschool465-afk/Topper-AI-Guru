<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#6366f1" />
    <title>Topper AI Guru 🏆</title>

    <style>
      #loading-screen {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #0f172a;
        color: white; z-index: 9999; font-family: sans-serif;
      }
      .loader {
        width: 48px; height: 48px; border: 5px solid #FFF;
        border-bottom-color: #6366f1; border-radius: 50%;
        animation: rotation 1s linear infinite;
      }
      @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
    </style>
  </head>

  <body style="margin:0;">
    <div id="loading-screen">
      <div class="loader"></div>
      <h2 style="margin-top: 20px; letter-spacing: 2px;">TOPPER AI GURU</h2>
      <p style="opacity: 0.5; font-size: 12px;">Safar shuru ho raha hai...</p>
    </div>

    <div id="root"></div>

    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
